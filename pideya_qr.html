<style>

  body {

    background: #0a0f0d;
    font-family:'Sora',sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .card {
    background: #111a16;

    border-radius: 24px;

    max-width: 420px;
    width: 100%;

  .subtitle { font-size:.9rem; color:#4d6b55; margin-bottom:32px; }
  .qr-wrap {
    background:#fff; border-radius:16px; padding:16px;
    display:inline-block; margin-bottom:28px;
  }
  .qr-wrap img { display:block; width:220px; height:220px; }
  .instruction {
    font-size:.85rem; color:#86efac; margin-bottom:24px; line-height:1.6;
  }
  .wa-btn {

    background:#22c55e; color:#000; font-weight:700; font-size:.95rem;
    padding:14px 28px; border-radius:12px; text-decoration:none;
    transition:.2s;
  }
  .wa-btn:hover { background:#16a34a; }
  .number { font-size:.78rem; color:#4d6b55; margin-top:20px; }
</style>
