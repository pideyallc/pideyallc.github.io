<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIDEYA - Ticket de Cocina</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Courier New', monospace; background: #f5f5f5; display: flex; justify-content: center; padding: 20px; }
  .ticket { background: white; width: 320px; padding: 16px; border: 1px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .header { text-align: center; border-bottom: 2px dashed #333; padding-bottom: 12px; margin-bottom: 12px; }
  .logo { font-size: 22px; font-weight: bold; letter-spacing: 2px; }
  .restaurant { font-size: 13px; color: #555; margin-top: 4px; }
  .order-id { font-size: 18px; font-weight: bold; margin: 8px 0 4px; }
  .timestamp { font-size: 11px; color: #777; }
  .section { margin: 12px 0; }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #777; margin-bottom: 6px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
  .info-row { display: flex; justify-content: space-between; font-size: 12px; margin: 4px 0; }
  .info-label { color: #555; }
  .info-value { font-weight: bold; text-align: right; max-width: 180px; word-break: break-word; }
  .items-section { margin: 12px 0; }
  .item { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px dotted #eee; }
  .item-name { flex: 1; }
  .item-qty { font-weight: bold; margin-right: 8px; color: #333; }
  .item-price { font-weight: bold; white-space: nowrap; }
  .item-note { font-size: 11px; color: #888; font-style: italic; padding: 2px 0 4px 0; }
  .totals { border-top: 2px dashed #333; margin-top: 12px; padding-top: 10px; }
  .total-row { display: flex; justify-content: space-between; font-size: 12px; margin: 4px 0; }
  .total-row.grand { font-size: 16px; font-weight: bold; border-top: 1px solid #333; margin-top: 6px; padding-top: 6px; }
  .footer { text-align: center; margin-top: 14px; padding-top: 12px; border-top: 2px dashed #333; font-size: 11px; color: #777; }
  .print-btn { display: block; width: 100%; padding: 10px; background: #25D366; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 16px; }
  @media print {
    body { background: white; padding: 0; }
    .ticket { box-shadow: none; border: none; width: 100%; }
    .print-btn { display: none; }
  }
</style>
</head>
<body>
<div class="ticket">
  <div class="header">
    <div class="logo">PIDEYA</div>
    <div class="restaurant">El Conuco Restaurante</div>
    <div class="order-id" id="order-id">---</div>
    <div class="timestamp" id="timestamp">---</div>
  </div>
  <div class="section">
    <div class="section-title">Cliente</div>
    <div class="info-row"><span class="info-label">Nombre:</span><span class="info-value" id="customer-name">---</span></div>
    <div class="info-row"><span class="info-label">Telefono:</span><span class="info-value" id="customer-phone">---</span></div>
    <div class="info-row"><span class="info-label">Direccion:</span><span class="info-value" id="customer-address">---</span></div>
  </div>
  <div class="items-section">
    <div class="section-title">Pedido</div>
    <div id="items-list">---</div>
  </div>
  <div class="totals">
    <div class="total-row"><span>Subtotal:</span><span id="val-subtotal">---</span></div>
    <div class="total-row"><span>Tax NJ (6.625%):</span><span id="val-tax">---</span></div>
    <div class="total-row"><span>Gestion:</span><span id="val-gestion">---</span></div>
    <div class="total-row grand"><span>TOTAL A PAGAR:</span><span id="val-total">---</span></div>
  </div>
  <div class="footer">
    <div>715 Summit Ave, Union City, NJ 07087</div>
    <div style="margin-top:4px;">PIDEYA LLC | pideyallc.github.io</div>
  </div>
  <button class="print-btn" onclick="window.print()">Imprimir Ticket</button>
</div>
<script>
  // Safe param reader — strips $ sign if present
  function p(name) {
    var val = new URLSearchParams(window.location.search).get(name) || '';
    return val.replace('$', '').trim();
  }

  // Safe money formatter
  function fmt(val) {
    var n = parseFloat(val);
    return isNaN(n) ? null : n;
  }

  function fmtDisplay(val) {
    var n = fmt(val);
    return n === null ? '---' : '$' + n.toFixed(2);
  }

  function fmtPhone(ph) {
    return ph.replace('whatsapp:', '').replace(/(\+\d{1})(\d{3})(\d{3})(\d{4})/, '$1 ($2) $3-$4');
  }

  window.onload = function() {
    document.getElementById('order-id').textContent = p('order') ? '#' + p('order') : '#---';
    document.getElementById('timestamp').textContent = new Date().toLocaleString('es-US', {
      timeZone: 'America/New_York', dateStyle: 'short', timeStyle: 'short'
    });
    document.getElementById('customer-name').textContent    = decodeURIComponent(p('name'))    || '---';
    document.getElementById('customer-phone').textContent   = p('phone') ? fmtPhone(decodeURIComponent(p('phone'))) : '---';
    document.getElementById('customer-address').textContent = decodeURIComponent(p('address')) || '---';

    // Parse and render items — also compute subtotal from items as fallback
    var itemsRaw = decodeURIComponent(new URLSearchParams(window.location.search).get('items') || '');
    var itemsList = document.getElementById('items-list');
    var computedSubtotal = 0;

    if (itemsRaw) {
      itemsList.innerHTML = '';
      itemsRaw.split('|').forEach(function(item) {
        var t = item.trim(); if (!t) return;
        var noteMatch = t.match(/\(([^)]+)\)/);
        var note = noteMatch ? noteMatch[1] : '';
        var clean = t.replace(/\([^)]+\)/, '').trim();
        var parts = clean.split(' - ');
        var nameQty = parts[0] || clean;
        var priceStr = (parts[1] || '').replace('$','').trim();
        var price = parseFloat(priceStr);
        if (!isNaN(price)) computedSubtotal += price;
        var qm = nameQty.match(/^(\d+)x\s+(.+)$/);
        var qty = qm ? qm[1] : '1';
        var itemName = qm ? qm[2].trim() : nameQty;
        var div = document.createElement('div');
        div.innerHTML = '<div class="item">'
          + '<span class="item-qty">' + qty + 'x</span>'
          + '<span class="item-name">' + itemName + '</span>'
          + '<span class="item-price">' + (priceStr ? '$' + parseFloat(priceStr).toFixed(2) : '') + '</span>'
          + '</div>'
          + (note ? '<div class="item-note">Nota: ' + note + '</div>' : '');
        itemsList.appendChild(div);
      });
    }

    // Financial breakdown — read each param, fallback to computed values
    var subtotal = fmt(p('subtotal')) !== null ? fmt(p('subtotal')) : computedSubtotal;
    var TAX_RATE = 0.06625;
    var GESTION  = 2.00;
    var tax      = fmt(p('tax'))      !== null ? fmt(p('tax'))      : parseFloat((subtotal * TAX_RATE).toFixed(2));
    var gestion  = fmt(p('gestion'))  !== null ? fmt(p('gestion'))  : GESTION;
    // ✅ Always compute total as sum — never trust passed total alone
    var total    = parseFloat((subtotal + tax + gestion).toFixed(2));

    document.getElementById('val-subtotal').textContent = '$' + subtotal.toFixed(2);
    document.getElementById('val-tax').textContent      = '$' + tax.toFixed(2);
    document.getElementById('val-gestion').textContent  = '$' + gestion.toFixed(2);
    document.getElementById('val-total').textContent    = '$' + total.toFixed(2);

    document.title = 'Ticket ' + (p('order') || '') + ' - PIDEYA';
  };
</script>
</body>
</html>
