<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIDEYA — Panel de Control</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--green:#25D366;--dark:#0a0f0d;--mid:#1a2620;--card:#111a15;--border:#1e2e24;--text:#e8f0eb;--muted:#6b8a74;--accent:#3dff8a;--yellow:#ffd166;--blue:#66b2ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}
.password-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:9999;}
.password-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center;width:320px;}
.password-logo{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:var(--accent);letter-spacing:2px;margin-bottom:8px;}
.password-sub{font-size:12px;color:var(--muted);margin-bottom:28px;text-transform:uppercase;letter-spacing:1px;}
.password-input{width:100%;padding:12px 16px;background:var(--mid);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:16px;font-family:'IBM Plex Mono',monospace;outline:none;margin-bottom:12px;text-align:center;letter-spacing:3px;}
.password-input:focus{border-color:var(--accent);}
.password-btn{width:100%;padding:12px;background:var(--green);color:#000;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;}
.password-btn:hover{background:var(--accent);}
.password-error{color:#ff5252;font-size:12px;margin-top:10px;display:none;}
.header{background:var(--mid);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.logo{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:var(--accent);letter-spacing:2px;}
.logo span{color:var(--muted);font-weight:400;}
.subtitle{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;margin-right:6px;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.main{padding:28px 32px;}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px;}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;position:relative;overflow:hidden;}
.summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.summary-card.green::before{background:var(--green);}
.summary-card.accent::before{background:var(--accent);}
.summary-card.yellow::before{background:var(--yellow);}
.summary-card.blue::before{background:var(--blue);}
.card-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.card-value{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;}
.card-value.green{color:var(--green);}
.card-value.accent{color:var(--accent);}
.card-value.yellow{color:var(--yellow);}
.card-value.blue{color:var(--blue);}
.card-sub{font-size:11px;color:var(--muted);margin-top:6px;}
.section-title{font-family:'IBM Plex Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:28px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:700px;}
thead tr{border-bottom:1px solid var(--border);}
th{padding:12px 16px;text-align:left;font-size:11px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:500;white-space:nowrap;}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(30,46,36,0.5);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.td-mono{font-family:'IBM Plex Mono',monospace;font-size:12px;}
.td-green{color:var(--green);font-family:'IBM Plex Mono',monospace;font-weight:500;}
.td-accent{color:var(--accent);font-family:'IBM Plex Mono',monospace;font-weight:600;}
.td-muted{color:var(--muted);font-size:12px;}
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;}
.badge-green{background:rgba(37,211,102,0.15);color:var(--green);}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.loading{text-align:center;padding:40px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:13px;}
.refresh-btn{padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text);font-family:'IBM Plex Sans',sans-serif;}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);}
.footer{padding:20px 32px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}
</style>
</head>
<body>
<div class="password-screen" id="password-screen">
  <div class="password-box">
    <div class="password-logo">PIDEYA LLC</div>
    <div class="password-sub">Panel de Control — Acceso Restringido</div>
    <input type="password" class="password-input" id="pwd-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPwd()">
    <button class="password-btn" onclick="checkPwd()">🔐 Ingresar</button>
    <div class="password-error" id="pwd-error">Contraseña incorrecta. Intenta de nuevo.</div>
  </div>
</div>
<div class="header">
  <div>
    <div class="logo">PIDEYA <span>LLC</span></div>
    <div class="subtitle"><span class="live-dot"></span>Panel de Control — Ordenes en Tiempo Real</div>
  </div>
  <div style="display:flex;gap:10px;">
    <button class="refresh-btn" onclick="loadData()">↻ Actualizar</button>
    <button class="refresh-btn" onclick="window.print()">🖨️ Imprimir</button>
  </div>
</div>
<div class="main">
  <div class="summary-grid" id="summary-cards"><div class="loading">Cargando...</div></div>
  <div class="section-title">Ultimas Ordenes</div>
  <div class="table-wrap" id="orders-table"><div class="loading">Cargando ordenes...</div></div>
</div>
<div class="footer">
  <span>PIDEYA LLC — El Conuco Restaurante | 715 Summit Ave, Union City, NJ 07087</span>
  <span id="last-update"></span>
</div>
<script>
var SHEET_ID='1qzvOElYXtlkdBpiqI3_1E3HRQKlnm4JFhYxtZoNT4r4';
var CORRECT_PASSWORD='pideya2024';
var SESSION_KEY='pideya_dashboard_auth';
var allOrders=[];
function checkPwd(){
  var input=document.getElementById('pwd-input').value;
  if(input===CORRECT_PASSWORD){sessionStorage.setItem(SESSION_KEY,'1');document.getElementById('password-screen').style.display='none';loadData();}
  else{document.getElementById('pwd-error').style.display='block';document.getElementById('pwd-input').value='';document.getElementById('pwd-input').focus();}
}
function fmt(n){var v=parseFloat(String(n).replace(/[^0-9.\-]/g,''));return isNaN(v)?'$0.00':'$'+v.toFixed(2);}
function toNum(n){var v=parseFloat(String(n).replace(/[^0-9.\-]/g,''));return isNaN(v)?0:v;}
async function fetchOrders(){
  try{
    var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/export?format=csv&gid=0';
    var resp=await fetch(url,{mode:'cors'});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    var csv=await resp.text();
    var lines=csv.split('\n').filter(function(l){return l.trim();});
    if(lines.length<2)throw new Error('empty');
    function parseCSVLine(line){var result=[],current='',inQuotes=false;for(var i=0;i<line.length;i++){var c=line[i];if(c==='"'){inQuotes=!inQuotes;}else if(c===','&&!inQuotes){result.push(current.trim());current='';}else{current+=c;}}result.push(current.trim());return result;}
    var headers=parseCSVLine(lines[0]);
    var rows=[];
    for(var i=1;i<lines.length;i++){var vals=parseCSVLine(lines[i]);var obj={};headers.forEach(function(h,j){obj[h]=vals[j]||'';});if(obj['Order ID'])rows.push(obj);}
    return rows;
  }catch(e){return[];}
}
async function loadData(){
  document.getElementById('summary-cards').innerHTML='<div class="loading">Cargando...</div>';
  document.getElementById('orders-table').innerHTML='<div class="loading">Cargando ordenes...</div>';
  allOrders=await fetchOrders();
  allOrders.sort(function(a,b){return new Date(b['Timestamp'])-new Date(a['Timestamp']);});
  var today=new Date().toISOString().split('T')[0];
  var todayOrders=allOrders.filter(function(o){return o['Timestamp']&&o['Timestamp'].startsWith(today);});
  var totalRevenue=0,todayRevenue=0;
  allOrders.forEach(function(o){totalRevenue+=toNum(o['Total']);});
  todayOrders.forEach(function(o){todayRevenue+=toNum(o['Total']);});
  document.getElementById('summary-cards').innerHTML=card('green','Ordenes Hoy',todayOrders.length,'Pedidos confirmados hoy')+card('accent','Ventas Hoy',fmt(todayRevenue),'Ingresos del dia de hoy')+card('yellow','Total Ordenes',allOrders.length,'Todos los pedidos historicos')+card('blue','Total Recaudado',fmt(totalRevenue),'Ingresos totales historicos');
  var recent=allOrders.slice(0,50);
  if(!recent.length){document.getElementById('orders-table').innerHTML='<div class="empty">No hay ordenes registradas aun.</div>';}
  else{
    var rows=recent.map(function(o){
      var d=o['Timestamp']?new Date(o['Timestamp']):null;
      var ds=d?d.toLocaleString('es-US',{timeZone:'America/New_York',dateStyle:'short',timeStyle:'short'}):'---';
      return '<tr><td class="td-mono td-muted">'+(o['Order ID']||'---')+'</td><td class="td-muted">'+ds+'</td><td>'+(o['Name']||'---')+'</td><td class="td-muted" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+(o['Items']||'---')+'</td><td class="td-green">'+fmt(o['Subtotal'])+'</td><td class="td-muted">'+fmt(o['Tax'])+'</td><td class="td-accent">'+fmt(o['Total'])+'</td><td><span class="badge badge-green">'+(o['Status']||'Confirmed')+'</span></td></tr>';
    });
    document.getElementById('orders-table').innerHTML='<table><thead><tr><th>Orden #</th><th>Fecha</th><th>Cliente</th><th>Items</th><th>Subtotal</th><th>Tax NJ</th><th>Total</th><th>Estado</th></tr></thead><tbody>'+rows.join('')+'</tbody></table>';
  }
  document.getElementById('last-update').textContent='Actualizado: '+new Date().toLocaleString('es-US',{timeZone:'America/New_York',timeStyle:'short'});
}
function card(color,label,value,sub){return '<div class="summary-card '+color+'"><div class="card-label">'+label+'</div><div class="card-value '+color+'">'+value+'</div><div class="card-sub">'+sub+'</div></div>';}
window.onload=function(){
  if(sessionStorage.getItem(SESSION_KEY)==='1'){document.getElementById('password-screen').style.display='none';loadData();}
  else{document.getElementById('pwd-input').focus();}
};
</script>
</body>
</html>
