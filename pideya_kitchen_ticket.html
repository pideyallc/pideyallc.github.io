<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIDEYA - Ticket de Cocina</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Courier New', monospace; background: #f5f5f5; display: flex; justify-content: center; padding: 20px; }
  .ticket { background: white; width: 320px; padding: 16px; border: 1px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .header { text-align: center; border-bottom: 2px dashed #333; padding-bottom: 12px; margin-bottom: 12px; }
  .logo { font-size: 22px; font-weight: bold; letter-spacing: 2px; }
  .restaurant { font-size: 13px; color: #555; margin-top: 4px; }
  .order-id { font-size: 18px; font-weight: bold; margin: 8px 0 4px; }
  .timestamp { font-size: 11px; color: #777; }
  .section { margin: 12px 0; }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #777; margin-bottom: 6px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
  .info-row { display: flex; justify-content: space-between; font-size: 12px; margin: 4px 0; }
  .info-label { color: #555; }
  .info-value { font-weight: bold; text-align: right; max-width: 180px; word-break: break-word; }
  .items-section { margin: 12px 0; }
  .item { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px dotted #eee; }
  .item-name { flex: 1; }
  .item-qty { font-weight: bold; margin-right: 8px; color: #333; }
  .item-price { font-weight: bold; white-space: nowrap; }
  .item-note { font-size: 11px; color: #888; font-style: italic; padding: 2px 0 4px 0; }
  .totals { border-top: 2px dashed #333; margin-top: 12px; padding-top: 10px; }
  .total-row { display: flex; justify-content: space-between; font-size: 12px; margin: 4px 0; }
  .total-row.grand { font-size: 16px; font-weight: bold; border-top: 1px solid #333; margin-top: 6px; padding-top: 6px; }
  .footer { text-align: center; margin-top: 14px; padding-top: 12px; border-top: 2px dashed #333; font-size: 11px; color: #777; }
  .print-btn { display: block; width: 100%; padding: 10px; background: #25D366; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 16px; }
  @media print {
    body { background: white; padding: 0; }
    .ticket { box-shadow: none; border: none; width: 100%; }
    .print-btn { display: none; }
  }
</style>
</head>
<body>
<div class="ticket">
  <div class="header">
    <div class="logo">🍽️ PIDEYA</div>
    <div class="restaurant">El Conuco Restaurante</div>
    <div class="order-id" id="order-id">---</div>
    <div class="timestamp" id="timestamp">---</div>
  </div>

  <div class="section">
    <div class="section-title">Cliente</div>
    <div class="info-row"><span class="info-label">Nombre:</span><span class="info-value" id="customer-name">---</span></div>
    <div class="info-row"><span class="info-label">Teléfono:</span><span class="info-value" id="customer-phone">---</span></div>
    <div class="info-row"><span class="info-label">Dirección:</span><span class="info-value" id="customer-address">---</span></div>
  </div>

  <div class="items-section">
    <div class="section-title">Pedido</div>
    <div id="items-list">---</div>
  </div>

  <div class="totals">
    <div class="total-row"><span>Subtotal:</span><span id="subtotal">---</span></div>
    <div class="total-row"><span>Tax NJ (6.625%):</span><span id="tax">---</span></div>
    <div class="total-row"><span>Gestión:</span><span id="gestion">---</span></div>
    <div class="total-row grand"><span>TOTAL:</span><span id="total">---</span></div>
  </div>

  <div class="footer">
    <div>715 Summit Ave, Union City, NJ 07087</div>
    <div style="margin-top:4px;">PIDEYA LLC | pideyallc.github.io</div>
  </div>

  <button class="print-btn" onclick="window.print()">🖨️ Imprimir Ticket</button>
</div>

<script>
  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name) || '';
  }
  function formatPhone(p) {
    return p.replace('whatsapp:', '').replace(/(\+\d{1})(\d{3})(\d{3})(\d{4})/, '$1 ($2) $3-$4');
  }
  window.onload = function() {
    const order    = getParam('order');
    const name     = getParam('name');
    const phone    = getParam('phone');
    const address  = getParam('address');
    const itemsRaw = getParam('items');
    const subtotal = getParam('subtotal');
    const tax      = getParam('tax');
    const gestion  = getParam('gestion');
    const total    = getParam('total');

    document.getElementById('order-id').textContent = order ? '#' + order : '#---';
    document.getElementById('timestamp').textContent = new Date().toLocaleString('es-US', { timeZone: 'America/New_York', dateStyle: 'short', timeStyle: 'short' });
    document.getElementById('customer-name').textContent = name || '---';
    document.getElementById('customer-phone').textContent = phone ? formatPhone(phone) : '---';
    document.getElementById('customer-address').textContent = address || '---';

    // Parse and render items
    const itemsList = document.getElementById('items-list');
    if (itemsRaw) {
      const items = itemsRaw.split('|');
      itemsList.innerHTML = '';
      items.forEach(item => {
        const trimmed = item.trim();
        if (!trimmed) return;
        const noteMatch = trimmed.match(/\(([^)]+)\)/);
        const note = noteMatch ? noteMatch[1] : '';
        const cleanItem = trimmed.replace(/\([^)]+\)/, '').trim();
        const parts = cleanItem.split(' - ');
        const nameQty = parts[0] || cleanItem;
        const price = parts[1] || '';
        const qtyMatch = nameQty.match(/^(\d+)x\s+(.+)$/);
        const qty = qtyMatch ? qtyMatch[1] : '1';
        const itemName = qtyMatch ? qtyMatch[2].trim() : nameQty;
        const div = document.createElement('div');
        div.innerHTML = `<div class="item"><span class="item-qty">${qty}x</span><span class="item-name">${itemName}</span><span class="item-price">${price}</span></div>${note ? `<div class="item-note">📝 ${note}</div>` : ''}`;
        itemsList.appendChild(div);
      });
    }

    // Financial breakdown
    document.getElementById('subtotal').textContent = subtotal ? '$' + parseFloat(subtotal).toFixed(2) : '---';
    document.getElementById('tax').textContent = tax ? '$' + parseFloat(tax).toFixed(2) : '---';
    document.getElementById('gestion').textContent = gestion ? '$' + parseFloat(gestion).toFixed(2) : '$2.00';
    document.getElementById('total').textContent = total ? '$' + parseFloat(total).toFixed(2) : '---';
    document.title = 'Ticket ' + (order || '') + ' - PIDEYA';
  };
</script>
</body>
</html>
